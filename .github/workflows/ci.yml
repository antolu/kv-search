name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest -vv --maxfail=1 --durations=10 | tee pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-log
          path: pytest.log

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files
